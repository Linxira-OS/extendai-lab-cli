<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Abstract AI/Extension symbol with Linxira colors -->
  <g transform="translate(20, 20)">
    <!-- Main circle with gradient -->
    <circle cx="60" cy="60" r="50" fill="url(#grad1)" opacity="0.9"/>
    <!-- Inner pattern: extending lines -->
    <path d="M40 40 L80 40 L80 80 L40 80 Z" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
    <path d="M50 50 L70 50 L70 70 L50 70 Z" fill="white" opacity="0.6"/>
    <!-- Extension arrows -->
    <path d="M85 60 L105 60" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M95 50 L105 60 L95 70" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M60 85 L60 105" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M50 95 L60 105 L70 95" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: ExtendAI Lab -->
  <text x="160" y="95" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#0B1121">
    ExtendAI
  </text>
  <text x="480" y="95" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="300" fill="url(#grad2)">
    Lab
  </text>
  
  <!-- Subtle underline with gradient -->
  <rect x="160" y="110" width="400" height="3" rx="1.5" fill="url(#grad1)" opacity="0.3"/>
</svg>
